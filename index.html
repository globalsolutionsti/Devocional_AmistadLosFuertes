<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html{
      -webkit-text-size-adjust: 100%;
      color-scheme: light;
    }

    html, body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#0f1115;
}

    body{
  margin:0;
  padding:0;
  background:#0f1115;
  font-family:'Poppins', sans-serif;
}

 .container{
  width:100%;
  min-height:100vh;
  padding:30px 0 60px 0; /* quitamos laterales */
  box-sizing:border-box;
}

 .card{
  width:100%;
  text-align:center;
  padding:0 18px;
  box-sizing:border-box;
}

    .title, .devocional-title{
      font-family:'Cinzel', serif;
      font-size:50px;
      font-weight:700;
      letter-spacing:4px;
      color:#ffffff;

    }

    input[type="tel"]{
      width:100%;
      padding:22px;
      font-size:28px;
      border-radius:16px;
      border:1px solid #ddd;
      background:#ffffff;
      color:#000000;
      text-align:center;
      margin-bottom:35px;
    }

    button{
      width:100%;
      padding:18px;
      font-size:20px;
      border-radius:14px;
      border:none;
      background:#2f7df6;
      color:white;
      font-weight:600;
      cursor:pointer;
      margin-top:10px;

    .error{
      margin-top:20px;

    .hidden{

    .fecha-container input{

      padding:18px;

      background:#ffffff;

      border:1px solid #ddd;

    .lecturas-container{

    .reflexion-container{
      margin-top:30px;

    .reflexion-container h3{
      font-family:'Cinzel', serif;

    }

    .reflexion-container textarea{
      width:100%;
      min-height:160px;
      padding:16px;
      font-size:18px;
      border-radius:14px;
      border:1px solid #ddd;
      background:#ffffff;
      color:#000000;
      resize:vertical;
    }


/* =============================== */
/* ESTILO APP MÓVIL MODERNA */
/* =============================== */

.title, .devocional-title{
  font-size:clamp(42px, 8vw, 64px);
}

.usuario-nombre{
  font-size:clamp(20px, 4.5vw, 32px);
}

button{
  border-radius:18px;
}

.lecturas-box,
.reflexion-container textarea{
  border-radius:18px;
}

@media screen and (min-width: 900px){

  .container{
    max-width:500px;
    margin:0 auto;
  }

}

body{
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

.reflexion-container h3{
  text-align:center;
}

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(0,0,0,0.85);
  color:#fff;
  padding:14px 22px;
  border-radius:16px;
  font-size:14px;
  opacity:0;
  transition:all .3s ease;
  z-index:9999;
  backdrop-filter:blur(10px);
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

#pin{
  font-size:32px;
  padding:20px;
  text-align:center;
  letter-spacing:10px;
  border-radius:18px;
}

/* ===== SPINNER PROFESIONAL ===== */

.spinner-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px);
  display:none; /* 🔴 ahora inicia oculto */
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.spinner-overlay.active{
  display:flex; /* 🔵 solo cuando esté activo */
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #2f7df6;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  0%{ transform:rotate(0deg); }
  100%{ transform:rotate(360deg); }
}
.barra-superior{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

 .usuario-info{
  display:flex;
  align-items:center;
  gap:10px;
}

.icono-usuario{
  width:22px;
  height:22px;
  color:#2f7df6;
}

.icono-salir{
  width:16px;
  height:16px;
}

.btn-salir{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  width:fit-content;
  padding:10px 18px;
  font-size:14px;
  border-radius:10px;
  border:none;
  background:#dc3545;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s ease;
  margin:15px auto; /* 🔵 ESTO LO CENTRA */
}
.btn-dashboard{
  display:flex;
  align-items:center;
  justify-content:center;
  width:fit-content;
  margin:10px auto;
  padding:10px 18px;
  font-size:14px;
  border-radius:10px;
  border:none;
  background:#2f7df6;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s ease;
}

.btn-dashboard:hover{
  background:#1c5ed6;
  transform:scale(1.05);
}
.btn-salir:hover{
  background:#bb2d3b;
  transform:scale(1.05);
}

/* ===== TABLA DASHBOARD ===== */

.tabla-dashboard{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:600px;
}

.tabla-dashboard th,
.tabla-dashboard td{
  padding:6px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

.tabla-dashboard th{
  background:rgba(255,255,255,0.08);
  font-weight:600;
}

.col-usuario{
  min-width:150px;
  max-width:150px;
  width:150px;
  text-align:left;
  padding-left:10px;
  font-weight:bold;
  color:white;
}

 /* ===== CALENDARIO RESPONSIVE ===== */

.calendario{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-top:15px;
}
    
.dia-header{
  text-align:center;
  font-weight:700;
  font-size:13px;
  color:#00ffcc;
}
.dia-calendario{
  padding:10px 0;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
}

.dia-activo{
  background:#00c853;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.dia-activo:hover{
  transform:scale(1.05);
}

.dia-inactivo{
  background:rgba(255,255,255,0.08);
  color:#888;
}   
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <div class="title">MI DEVOCIONAL</div>
    <input type="password" id="pin" placeholder="••••" inputmode="numeric">
    <button onclick="login()">INGRESAR</button>
    <div id="error" class="error"></div>
  </div>

  <div id="devocional" class="card hidden">

  <div class="devocional-title">MI DEVOCIONAL</div>

  <div id="nombreUsuario" class="usuario-nombre"></div>

<button id="btnDashboard" class="btn-dashboard hidden" onclick="abrirDashboard()">

</button>

<button class="btn-salir" onclick="cerrarSesion()">
  Cerrar sesión
</button>

  <div style="margin-bottom:25px;">

  </div>

  <div class="fecha-container">
    <input type="date" id="fechaDevocional">
  </div>

  <div class="lecturas-container">

  </div>

  <div class="reflexion-container">

    <textarea id="reflexionDia"></textarea>
    <button id="btnReflexion" onclick="accionReflexion()">Guardar</button>
  </div>

</div>

  <!-- NUEVA PANTALLA METAS (NO TOCAR) -->
  <div id="metasMensuales" class="card hidden"></div>

<div id="dashboard" class="card hidden">

  <div class="devocional-title">DASHBOARD ADMIN</div>

  <button class="btn-dashboard" onclick="volverDevocional()">
    🔙 Regresar a MI DEVOCIONAL
  </button>

  <div style="margin:20px 0;">
    <input type="date" id="fechaDashboard">
  </div>

  <div id="tablaUsuarios" style="overflow:auto;"></div>
<div id="calendarioUsuario" style="margin-top:20px;"></div>
<hr style="margin:40px 0; border-color:rgba(255,255,255,0.1);">

<div id="panelDetalle" style="text-align:left;">

  <h3 style="color:white; text-align:center; margin-bottom:20px;">
    📌 DETALLE MENSUAL POR USUARIO
  </h3>

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
    
    <div style="flex:1; min-width:150px;">
  <label style="color:#00ffcc; font-size:12px; font-weight:600;">
    SERVIDOR
  </label>
  <select id="selectUsuario" style="width:100%; padding:12px; border-radius:10px; font-size:14px;">

</div>

</div>

    <button onclick="cargarDetalleUsuario()" style="width:100%; margin-top:10px;">
      Consultar
    </button>

  </div>

  <div id="contenedorMetas"></div>
  <div id="contenedorLogros" style="margin-top:25px;"></div>
  <div id="calendarioDetalle" style="margin-top:25px;"></div>

</div>



  
</div>
  
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbytGJbCWOFBEx-OoWJqdQbVBeDCy9MZSy384q6JFXy1gN0Ms5aCiDgiavyjII4R5Hy3/exec";
let usuarioActual = localStorage.getItem("usuarioDevocional") || "";
let usuarioRol = "";
function login(){

  const pin = document.getElementById("pin").value.trim();
  const error = document.getElementById("error");

  if(pin === ""){
    error.innerText = "Ingresa tu PIN";
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"validarPIN",
      pin:pin
    })
  })
  .then(res=>res.json())
  .then(respuesta=>{

    if(respuesta && respuesta.valido){

     usuarioActual = respuesta.nombre;
usuarioRol = respuesta.rol;

// 🔴 SIEMPRE OCULTAR PRIMERO
document.getElementById("btnDashboard").classList.add("hidden");

// 🔵 MOSTRAR SOLO SI ES ADMIN
if(usuarioRol === "ADMIN"){
  document.getElementById("btnDashboard").classList.remove("hidden");
}
     localStorage.setItem("usuarioDevocional", usuarioActual);
     activarAutoGuardadoGlobal();
      
      document.getElementById("login").classList.add("hidden");
      document.getElementById("devocional").classList.remove("hidden");

      document.getElementById("nombreUsuario").innerText = respuesta.nombre;

      const hoy = new Date();
      const year = hoy.getFullYear();
      const month = String(hoy.getMonth()+1).padStart(2,'0');
      const day = String(hoy.getDate()).padStart(2,'0');

      const fechaInput = document.getElementById("fechaDevocional");
      fechaInput.value = `${year}-${month}-${day}`;

      fechaInput.onchange = function(){
        cargarLecturas();
        cargarReflexion();
      };

      cargarLecturas();
      cargarReflexion();

    }else{
      error.innerText = "PIN incorrecto";
    }

  })
  .catch(()=>{
    error.innerText = "Error de conexión";
  });

}

function cargarLecturas(){

  const fecha = document.getElementById("fechaDevocional").value;
  const contenedor = document.getElementById("lecturasDelDia");

  contenedor.innerHTML = "Cargando...";

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"obtenerLecturas",
      fecha:fecha
    })
  })
  .then(res=>res.json())
  .then(respuesta=>{

    if(!respuesta || respuesta.length === 0){
      contenedor.innerHTML = "No hay Lecturas Registradas en Este Día";
      return;
    }

    let html = "";

    if(respuesta[0].plan){
      html += `
        <div style="margin-bottom:15px;">
          <h3 style="margin:0; font-weight:bold;">
            📖 Plan: ${respuesta[0].plan.replaceAll("_"," ")}
          </h3>
          <hr style="margin-top:5px;">
        </div>
      `;
    }

    for(let i=0; i<respuesta.length; i++){
      html += `
        <p style="margin:8px 0;">
          📖 <a href="${respuesta[i].url}" target="_blank">
            ${respuesta[i].lectura}
          </a>
        </p>
      `;
    }

    contenedor.innerHTML = html;

  })
  .catch(()=>{
    contenedor.innerHTML = "No hay Lecturas Registradas en Este Día";
  });

}

function cargarReflexion(){

  const fecha = document.getElementById("fechaDevocional").value;
  const textarea = document.getElementById("reflexionDia");
  const boton = document.getElementById("btnReflexion");

  textarea.value = "Cargando...";
  textarea.disabled = true;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"obtenerReflexion",
      nombre:usuarioActual,
      fecha:fecha
    })
  })
  .then(res=>res.json())
  .then(respuesta=>{

    if(respuesta && respuesta !== ""){
      textarea.value = respuesta;
      textarea.disabled = true;
      boton.innerText = "Actualizar Reflexión";
    } else {
      textarea.value = "";
      textarea.disabled = false;
      boton.innerText = "Guardar";
    }

  });

}

function accionReflexion(){

  const textarea = document.getElementById("reflexionDia");
  const boton = document.getElementById("btnReflexion");
  const fecha = document.getElementById("fechaDevocional").value;

  if(boton.innerText === "Actualizar Reflexión"){
    textarea.disabled = false;
    boton.innerText = "Guardar";
    textarea.focus();
    return;
  }

  const comentario = textarea.value.trim();

  if(comentario === ""){
    alert("Debe escribir una reflexión.");
    return;
  }

  // 🔵 MOSTRAR SPINNER
  mostrarSpinner();
  boton.disabled = true;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"guardarReflexion",
      nombre:usuarioActual,
      fecha:fecha,
      comentario:comentario
    })
  })
  .then(res=>res.json())
  .then(ok=>{

    if(ok){
      textarea.disabled = true;
      boton.innerText = "Actualizar Reflexión";
      alert("Reflexión guardada correctamente.");
    } else {
      alert("Error al guardar.");
    }

    // 🔴 OCULTAR SPINNER
    ocultarSpinner();
    boton.disabled = false;

  })
  .catch(()=>{
    ocultarSpinner();
    boton.disabled = false;
    alert("Error de conexión.");
  });

}

/* ========= METAS ========= */

function abrirMetas(){
  document.getElementById("devocional").classList.add("hidden");
  const cont = document.getElementById("metasMensuales");
  cont.classList.remove("hidden");
  cont.innerHTML = generarHTMLMetas();
}

function generarHTMLMetas(){

  const hoy = new Date();
  const mes = String(hoy.getMonth()+1).padStart(2,'0');
  const anio = hoy.getFullYear();

  return `
  <div class="devocional-title">MI DEVOCIONAL</div>
  <div class="usuario-nombre">${usuarioActual}</div>

  <div style="margin:20px 0;">
    <select id="mesMeta" style="width:100%; padding:15px; font-size:18px;">
      <option value="${mes}/${anio}">${mes}/${anio}</option>
    </select>
  </div>

  <h3 style="text-align:center; color:white; font-size:22px;">
ANTES DE EMPEZAR EL MES
</h3>
  <p style="text-align:center; font-size:18px; margin-bottom:25px; color:white;">
    ¿Qué quiero alcanzar con Dios?
  </p>

  ${crearCampo("Objetivo Mensual","objetivo")}
  ${crearCampo("Personal","personal")}
  ${crearCampo("Familiar","familiar")}
  ${crearCampo("Deportivo","deportivo")}
  ${crearCampo("Financiero","financiero")}
  ${crearCampo("Intelectual","intelectual")}
  ${crearCampo("Laboral","laboral")}
  ${crearCampo("Gigantes que debo Derrotar","gigantes")}

  <button id="btnGuardarInicio" onclick="guardarInicioMes()">Guardar</button>

  <hr style="margin:40px 0;">

  <h3 style="text-align:center; color:white; font-size:22px;">
AL FINALIZAR EL MES
</h3>

  ${crearCampo("¿A dónde me llevó Dios? ¿Qué victorias tuve?","final1")}
  ${crearCampo("¿Qué o cómo lo hizo Dios?","final2")}
  ${crearCampo("¿Cumplí mi meta? ¿Por qué?","final3")}
  ${crearCampo("¿Qué debo continuar y mejorar el siguiente mes?","final4")}
  <button id="btnGuardarFinal" onclick="guardarFinalMes()">Guardar</button>
  
  <button onclick="regresarDevocional()">Regresar a MI DEVOCIONAL</button>
  `;
}

function crearCampo(label,id){
  return `
    <div style="margin-bottom:25px;">
      <label style="
        display:block;
        color:white;
        font-size:18px;
        font-weight:600;
        margin-bottom:8px;
      ">
        ${label}
      </label>

      <textarea 
        id="${id}" 
        style="
          width:100%;
          min-height:110px;
          padding:15px;
          border-radius:14px;
          font-size:16px;
          color:black;
          font-family:inherit;
        ">
      </textarea>
    </div>
  `;
}

function regresarDevocional(){
  document.getElementById("metasMensuales").classList.add("hidden");
  document.getElementById("devocional").classList.remove("hidden");
}

function guardarInicioMes(){

  const campos = ["objetivo","personal","familiar","deportivo","financiero","intelectual","laboral","gigantes"];
  const boton = document.getElementById("btnGuardarInicio");

  if(boton.innerText === "Actualizar"){
    desbloquearCampos(campos);
    boton.innerText = "Guardar";
    return;
  }

  for(let c of campos){
    if(document.getElementById(c).value.trim() === ""){
      alert("Debe completar todos los campos.");
      return;
    }
  }

  const hoy = new Date();

  // 🔵 MOSTRAR SPINNER
  mostrarSpinner();
  boton.disabled = true;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"guardarMetasInicio",
      nombre:usuarioActual,
      anio:hoy.getFullYear(),
      mes:hoy.getMonth()+1,
      objetivo:objetivo.value,
      personal:personal.value,
      familiar:familiar.value,
      deportivo:deportivo.value,
      financiero:financiero.value,
      intelectual:intelectual.value,
      laboral:laboral.value,
      gigantes:gigantes.value
    })
  })
  .then(res=>res.json())
  .then(()=>{
    bloquearCampos(campos);
    boton.innerText = "Actualizar";
    mostrarToast("Metas guardadas correctamente.");

    // 🔴 OCULTAR SPINNER
    ocultarSpinner();
    boton.disabled = false;
  })
  .catch(()=>{
    ocultarSpinner();
    boton.disabled = false;
    alert("Error al guardar.");
  });

}


function guardarFinalMes(){

  const campos = ["final1","final2","final3","final4"];
  const boton = document.getElementById("btnGuardarFinal");

  if(boton.innerText === "Actualizar"){
    desbloquearCampos(campos);
    boton.innerText = "Guardar";
    return;
  }

  for(let c of campos){
    if(document.getElementById(c).value.trim() === ""){
      alert("Debe completar todos los campos.");
      return;
    }
  }

  const hoy = new Date();

  // 🔵 MOSTRAR SPINNER
  mostrarSpinner();
  boton.disabled = true;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"guardarLogrosFinalMes",
      nombre:usuarioActual,
      anio:hoy.getFullYear(),
      mes:hoy.getMonth()+1,
      victorias:final1.value,
      hizoDios:final2.value,
      cumplioMeta:final3.value,
      mejorar:final4.value
    })
  })
  .then(res=>res.json())
  .then(()=>{
    bloquearCampos(campos);
    boton.innerText = "Actualizar";
    mostrarToast("Logros guardados correctamente.");

    // 🔴 OCULTAR SPINNER
    ocultarSpinner();
    boton.disabled = false;
  })
  .catch(()=>{
    ocultarSpinner();
    boton.disabled = false;
    alert("Error al guardar.");
  });

}
function bloquearCampos(lista){
  lista.forEach(id=>{
    document.getElementById(id).disabled = true;
  });
}

function desbloquearCampos(lista){
  lista.forEach(id=>{
    document.getElementById(id).disabled = false;
  });
}

function mostrarToast(mensaje){
  const toast = document.getElementById("toast");
  toast.innerText = mensaje;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },3000);
}

// Auto-guardado para TODOS los textarea
function activarAutoGuardadoGlobal() {

  if (!usuarioActual) return;

  document.querySelectorAll("textarea").forEach(function (campo) {

    const key = "auto_" + usuarioActual + "_" + campo.id;

    const guardado = localStorage.getItem(key);
    if (guardado) {
      campo.value = guardado;
    }

    campo.addEventListener("input", function () {
      localStorage.setItem(key, campo.value);
    });

  });
}
  function mostrarSpinner(){
  const spinner = document.getElementById("spinnerGlobal");
  if(spinner){
    spinner.classList.add("active");
  }
}

function ocultarSpinner(){
  const spinner = document.getElementById("spinnerGlobal");
  if(spinner){
    spinner.classList.remove("active");
  }
}

  document.getElementById("devocional").classList.add("hidden");

  document.getElementById("fechaDashboard").value = hoy;

  cargarDashboard();

function cargarDashboard(){

  const fechaSeleccionada = new Date(document.getElementById("fechaDashboard").value);
  const año = fechaSeleccionada.getFullYear();
  const mes = fechaSeleccionada.getMonth();
  const hoy = new Date();
  const diaActual = hoy.getDate();
  const diasEnMes = new Date(año, mes + 1, 0).getDate();

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"obtenerResumenMensual",
      anio:año,
      mes:mes+1
    })
  })
  .then(res=>res.json())
  .then(data=>{

    let tabla = "<div style='overflow:auto;'>";
tabla += "<table class='tabla-dashboard'>";
tabla += "<tr><th class='col-usuario'>Usuario</th>";

for(let d=1; d<=diasEnMes; d++){
  tabla += "<th>"+d+"</th>";
}
tabla += "</tr>";

data.forEach(usuario=>{
  tabla += "<tr>";
  tabla += `<td class='col-usuario'
          style="cursor:pointer"
          onclick="generarCalendario('${usuario.nombre}',${JSON.stringify(usuario.dias)})">
          ${usuario.nombre}
          </td>`;

  for(let d=1; d<=diasEnMes; d++){

    if(d > diaActual){
      if(usuario.dias.includes(d)){
        tabla += "<td style='color:#00ff88;'>✔</td>";
      }else{
        tabla += "<td>-</td>";
      }
    }else{
      if(usuario.dias.includes(d)){
        tabla += "<td style='color:#00ff88;'>✔</td>";
      }else{
        tabla += "<td style='color:#ff4d4d;'>✖</td>";
      }
    }
  }

  tabla += "</tr>";
});

tabla += "</table></div>";

document.getElementById("tablaUsuarios").innerHTML = tabla;
// ===== CARGAR SELECT USUARIOS =====
let select = document.getElementById("selectUsuario");
select.innerHTML = "<option value=''>Seleccionar Usuario</option>";

data.forEach(u=>{
  select.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`;
});

// ===== CARGAR SELECT MESES =====
let selectMes = document.getElementById("selectMes");
selectMes.innerHTML = "<option value=''>Seleccionar Mes</option>";

const nombresMeses = [
  "Enero","Febrero","Marzo","Abril","Mayo","Junio",
  "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
];

for(let m=1; m<=12; m++){
  selectMes.innerHTML += 
    `<option value="${m}">${nombresMeses[m-1]}</option>`;
}

  });
}

function generarCalendario(usuario, diasConComentario){

  const fechaSeleccionada = new Date(document.getElementById("fechaDashboard").value);
  const año = fechaSeleccionada.getFullYear();
  const mes = fechaSeleccionada.getMonth();
  const diasEnMes = new Date(año, mes + 1, 0).getDate();

  let html = "<div class='calendario'>";

  for(let d=1; d<=diasEnMes; d++){

    if(diasConComentario.includes(d)){
      html += `<div class="dia-calendario dia-activo"
                onclick="verComentario('${usuario}',${d})">${d}</div>`;
    }else{
      html += `<div class="dia-calendario dia-inactivo">${d}</div>`;
    }
  }

  html += "</div>";

  document.getElementById("calendarioUsuario").innerHTML = html;
}

function verComentario(usuario, dia){

  const fechaSeleccionada = new Date(document.getElementById("fechaDashboard").value);
  const año = fechaSeleccionada.getFullYear();
  const mes = fechaSeleccionada.getMonth() + 1;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"obtenerComentarioDia",
      nombre:usuario,
      anio:año,
      mes:mes,
      dia:dia
    })
  })
  .then(res=>res.json())
  .then(texto=>{
    alert("Comentario del día "+dia+":\n\n"+texto);
  });
}

function generarCalendarioDetalle(usuario, anio, mes){

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      accion:"obtenerResumenMensual",
      anio:anio,
      mes:mes
    })
  })
  .then(res=>res.json())
  .then(data=>{

    const usuarioData = data.find(u=>u.nombre===usuario);
    if(!usuarioData) return;

    const diasConComentario = usuarioData.dias;
    const diasEnMes = new Date(anio, mes, 0).getDate();

    const nombresMeses = [
      "Enero","Febrero","Marzo","Abril","Mayo","Junio",
      "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
    ];

    const nombreMes = nombresMeses[mes-1];

    let html = `
      <h3 style="text-align:center; color:white; margin-bottom:10px;">
        ${nombreMes} ${anio}
      </h3>

      <div class="calendario">
        <div class="dia-header">L</div>
        <div class="dia-header">M</div>
        <div class="dia-header">M</div>
        <div class="dia-header">J</div>
        <div class="dia-header">V</div>
        <div class="dia-header">S</div>
        <div class="dia-header">D</div>
    `;

    const primerDia = new Date(anio, mes-1, 1).getDay();
    const ajuste = primerDia === 0 ? 6 : primerDia - 1;

    for(let i=0; i<ajuste; i++){
      html += `<div></div>`;
    }

    for(let d=1; d<=diasEnMes; d++){

      if(diasConComentario.includes(d)){
        html += `<div class="dia-calendario dia-activo"
                  onclick="verComentario('${usuario}',${d})">${d}</div>`;
      }else{
        html += `<div class="dia-calendario dia-inactivo">${d}</div>`;
      }
    }

    html += "</div>";

    document.getElementById("calendarioDetalle").innerHTML = html;

  });
}

}
